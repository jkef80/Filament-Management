<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CFSync</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logoWrap">
          <img src="/static/logo.png" alt="CFSync" class="logoImg" />
        </div>
        <div>
          <div class="title" id="printerTitle">CFSync</div>
          <div class="subtitle" id="printerSubtitle">Connecting…</div>
        </div>
      </div>

      <div class="topbarRight">
        <div class="refreshCtl">
          <label class="refreshLbl" for="refreshSelect">⟳</label>
          <select id="refreshSelect" class="refreshSel" title="Refresh interval">
            <option value="2000">2s</option>
            <option value="5000">5s</option>
            <option value="10000">10s</option>
            <option value="15000">15s</option>
            <option value="30000">30s</option>
          </select>
          <button id="refreshToggle" class="refreshBtn" title="Auto-refresh on/off">⏸</button>
        </div>
        <a id="spoolmanExtLink" class="spoolmanLink" href="#" target="_blank" rel="noreferrer" style="display:none;">Spoolman</a>
        <div class="badges">
          <div id="printerBadge" class="badge">Printers: —</div>
          <div id="cfsBadge" class="badge">CFS: —</div>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="printersWrap" class="printersWrap"></div>

      <footer class="footer">
        <span class="footerBookmark">
          <a id="fluiddBookmarklet" class="footerLink" href="#" title="Drag to bookmarks bar, then click in Fluidd to replace the Runout Sensors card with live CFS status">Fluidd panel</a>
          <button id="fluiddCopyBtn" class="footerCopyBtn" title="Copy bookmarklet to clipboard">⎘</button>
        </span>
        <span class="footerSep">·</span>
        <span class="footerBookmark">
          <button id="fluiddUserscriptBtn" class="footerCopyBtn" title="Generate a Tampermonkey userscript that auto-loads the panel on every Fluidd page visit">Tampermonkey script</button>
        </span>
      </footer>
    </main>

    <!-- cache-bust: force clients to fetch latest app.js after updates -->
    <script src="/static/app.js?v=20260312-2"></script>

    <!-- Slot / Spool editor (local bookkeeping only; never talks to printer) -->
    <div id="spoolModal" class="modal" style="display:none;">
      <div class="modalBackdrop" id="spoolBackdrop"></div>
      <div class="modalPanel">
        <div class="modalHead">
          <div>
            <div class="modalTitle" id="spoolTitle">Slot</div>
            <div class="modalSub" id="spoolSub">—</div>
          </div>
          <button class="modalClose" id="spoolClose" title="Close">✕</button>
        </div>
        <div class="modalBody">
          <div id="spoolmanSection" class="spoolmanSection" style="display:none;">
            <div class="spoolmanHead">
              <span class="spoolmanTitle">Spoolman</span>
              <span id="spoolmanBadge" class="tag muted">not linked</span>
            </div>
            <div id="spoolmanNotLinked" class="spoolmanNotLinkedWrap">
              <div id="spoolmanSelect" class="spoolmanList"></div>
              <button id="spoolmanLink" class="btn">Link</button>
            </div>
            <div id="spoolmanLinked" class="spoolmanRow" style="display:none;">
              <span id="spoolmanInfo" class="spoolmanInfo">—</span>
              <div class="spoolmanActions">
                <button id="spoolmanRefresh" class="btn mini">Refresh</button>
                <button id="spoolmanUnlink" class="btn mini">Unlink</button>
              </div>
            </div>
          </div>
          <div class="modalStats" id="spoolStats"></div>
          <div class="modalHint">Note: This saves locally in this app only (no POST to printer).</div>
        </div>
      </div>
    </div>
  </body>
</html>
